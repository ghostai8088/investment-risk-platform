[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "irp-shared"
version = "0.1.0"
description = "Investment Risk Platform - shared Python library (foundation frameworks)"
requires-python = ">=3.12"
dependencies = [
  "sqlalchemy>=2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/irp_shared"]
