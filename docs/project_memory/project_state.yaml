  instrument_terms: "FR / fully-reproducible / BITEMPORAL — the platform's FIRST persisted user of FullReproducibleMixin (valid_from/valid_to + system_from/system_to). Protocol: create -> effective-dated supersede (close prior valid_to) -> as-known correction/restatement (close prior system_to). One-now per op; close-first ordering; content of prior versions never mutated; NOT append-only (no irp_prevent_mutation trigger); current-head partial-unique (tenant_id, instrument_id) WHERE valid_to IS NULL AND system_to IS NULL"
  identifier_xref: "EV; polymorphic (entity_type, entity_id) NO domain FK, scoped to entity_type='instrument' in P1B-3; active partial-unique (tenant_id, scheme, value) WHERE valid_to IS NULL"
  first_real_fr: "TRUE — FullReproducibleMixin had NO persisted user through P1B-2; P1B-3 is its first exercise (temporal standard 2A note flipped to 'exercised P1B-3')"
  valid_time_reconstruction: "reconstruct_terms_as_of(valid_at) returns the terms version effective at the business date (TR-01); proven SQLite + PG-under-FORCE-RLS"
  known_time_reconstruction: "reconstruct_terms_as_of(valid_at, known_at) returns the version as-KNOWN-at the knowledge date (TR-02/TR-04); known_at defaults to now = current view; as-known-before-correction returns prior values, as-known-now returns corrected"
  reference_correction: "REFERENCE.CORRECTION (EVT-142) ACTIVATED for terms restatement (R-07 sign-off, OQ-7) via a NEW caller-side record_reference_correction helper in reference/service.py; audit/service.py FROZEN; TR-08 restatement_reason on the canonical justification field + supersedes_id link in DC-2 after_value"
