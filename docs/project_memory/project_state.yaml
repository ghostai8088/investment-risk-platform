  reconstruction: "reconstruct_terms_as_of(valid_at, known_at) proves BOTH axes (valid-time TR-01 + known-at/system-time TR-02/TR-04; known_at default = now = current view)"
  reference_correction: "REFERENCE.CORRECTION (EVT-142) ACTIVATED for terms restatement (R-07, OQ-7) via a NEW caller-side record_reference_correction; audit/service.py FROZEN; TR-08 restatement_reason on justification + supersedes_id link"
