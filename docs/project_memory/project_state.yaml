  no_real_data: "NO real client/vendor data — SYNTH_* / neutral names only; a structurally-invalid synthetic ISIN; no real ISIN/CUSIP/SEDOL/LEI/exchange/agency names."
  capture_only_scope: "NO market / risk / exposure / dataset_snapshot scope — capture-only: the seed only captures reference/hierarchy/transactions/positions/valuations through the existing governed binders; it computes nothing (no market value, no quantity*mark, no exposure aggregation, no dataset_snapshot)."
  no_control_weakening: "NO weakening of audit, lineage, RLS, entitlement, or temporal controls — every synthetic row is fully audited + lineaged under tenant RLS; the seam is additive (default-None) and prod-path-neutral."
  tests: "test_synthetic.py (20 SQLite tests: determinism/repeatability, refusal without the gate, edge cases, AST no-compute fence) + test_synthetic_pg.py (4 FORCE-RLS tests as the constrained irp_app role). The seed is uuid5-deterministic => NOT idempotent => seeded exactly ONCE per PG module."
