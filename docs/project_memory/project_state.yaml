# --- P1C-2 key deliverables (CLOSED, abb230f, CI-green run #46; the FIRST domain IA / append-only entity) ---
p1c2_deliverables:
  entity: [transaction]   # ENT-012, IA append-only; migration 0013; REQ-PPM-003 (transaction conjunct)
  ia_entity: "transaction = IA append-only (ImmutableAppendOnlyMixin: system_from ONLY; NO valid_*/system_to/record_version/status/is_active; __temporal_class__ = IMMUTABLE_APPEND_ONLY). A bare trade/cashflow event keyed to a portfolio + an instrument; quantity/price/gross_amount are INERT captures (never recomputed). TRULY IMMUTABLE (in APPEND_ONLY_TABLES, unlike the IA-status-mutable ingestion_batch/calculation_run)."
  two_layer_append_only: "transaction in APPEND_ONLY_TABLES -> the irp_prevent_mutation P0001 DB trigger (reusing the 0001 function) AND the ORM event.listen before_update/before_delete guard raising AppendOnlyViolation. PG test grants irp_app UPDATE/DELETE + a positive control so the rejection proves the P0001 TRIGGER (not a 42501 privilege denial); the forged-tenant 42501 is proven separately via a forged-tenant INSERT."
  reversal_convention: "reversal-as-new-record: a correction is an explicit NEW row (reverses_transaction_id self-FK; negated quantity/gross_amount; txn_type=REVERSAL) emitting TRANSACTION.REVERSE; the ORIGINAL is NEVER mutated (a reversal is an append, not an update); a reversal may itself be reversed. Tested: original byte-for-byte unchanged + exactly two rows for the pair."
