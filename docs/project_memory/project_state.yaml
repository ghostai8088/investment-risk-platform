  cross_tenant: "cross-tenant issuer_id/instrument_id/entity_id fail closed via the EXPLICIT tenant_id==acting_tenant resolver predicate (resolve_issuer/resolve_instrument -> *NotVisible) pre-commit; RLS WITH CHECK only gates the row's own tenant_id (does not tenant-check linked-id targets)"
  symmetric_rls: "all three PROPRIETARY tenant-scoped SYMMETRIC RLS (byte-for-byte the 0009 loop); NEVER hybrid; closed-hybrid-set still the 5 P1B-1 tables"
