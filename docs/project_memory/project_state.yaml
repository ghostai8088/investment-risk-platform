  review: "8-lens UltraCode adversarial review: 6 approve / 2 approve_with_changes, ZERO block, zero behavioral defect; fixes = no-DB-write-on-reject + out-of-vocab/no-op tests, lineage-edge-count lock, endpoint bad-status 422, and a CI-doc over-claim narrowed"
