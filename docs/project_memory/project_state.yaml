p1c6_deliverables:
  package: "NEW irp_shared/synthetic package (NO new entity, NO migration, NO ORM model) — ids.py (a fixed uuid5 namespace + synthetic_id(key); SYNTHETIC_TENANT_ID / SYNTHETIC_ACTOR_ID; SEED_EPOCH + a deterministic SeedClock.tick(); business_date) and builder.py (build_synthetic_dataset). Leaf tooling: synthetic -> {portfolio, position, valuation, transaction, reference, db}; nothing imports synthetic."
  deterministic_ids: "uuid5 deterministic IDs — every synthetic row's id is uuid5(_SYN_NS, key); reproducible run-to-run; no uuid4/new_uuid/uuid1/random (AST-fenced)."
  fixed_timestamps: "fixed INJECTED timestamps — a SeedClock yields SEED_EPOCH + N seconds; no datetime.now/utcnow in the seed path (AST-fenced). Injected THROUGH the governed binders so the audit hash chain + temporal axes are deterministic."
  governed_seed_path: "build_synthetic_dataset composes the GOVERNED service/binder paths (record_event audit hash chain + ensure_manual_source/record_lineage), NOT direct ORM inserts. Determinism delivered via a keyword-only, default-None deterministic-injection SEAM (entity_id/now) added to the governed binders (portfolio/position/valuation/transaction/reference instrument+identifier) + their audit _emit helpers (now -> record_event(event_time=now)); record_event's hash payload EXCLUDES the AuditEvent surrogate PK, so injected event_time + deterministic order => a deterministic chain. PRODUCTION call sites pass nothing => byte-for-byte unchanged (proven by the existing prod-path binder tests + an explicit prod-call-site-unchanged test). audit/service.py UNTOUCHED (frozen)."
  synthetic_reference_pack: "3 instruments (SYNTH-BOND-A / SYNTH-EQ-B / SYNTH-CASH-C; currency_code strings; issuer_id=None) + 2 identifiers (a STRUCTURALLY-INVALID synthetic ISIN ZZ0000000001 + an INTERNAL scheme) — no real instrument/issuer/vendor identifiers."
  synthetic_portfolio_hierarchy: "a 6-node subtree FUND -> {STRAT-1 -> {ACCT-1, ACCT-2}, STRAT-2 -> ACCT-3} (bounded; exercises the ancestor/descendant resolvers)."
  synthetic_transactions: "3 transactions — a BUY, a reverse-with-price, and a SELL (the IA append-only reversal-as-new-record path)."
  synthetic_positions: "6 position rows — incl. a SHORT (-200), an effective-dated supersede, and an as-known correction (the FR both-axes paths)."
  synthetic_valuations: "4 valuation rows — incl. a correction and multiple valuation_dates; one account/equity holding deliberately has NO mark (a stale/missing-mark edge case for the read-side holdings views)."
  never_auto_run: "NEVER wired to migrations or app startup; raises SyntheticSeedRefused unless allow_synthetic_seed=True AND os.environ['IRP_ALLOW_SYNTHETIC_SEED']=='1' AND the tenant is the reserved SYNTHETIC tenant (the reference/bootstrap seed_system_reference never-auto-run precedent)."
  production_refusal_guard: "refuses to run for any non-SYNTHETIC tenant and without the explicit confirmation + env gate — a production / wrong-tenant invocation fails closed; writes ONLY the reserved SYNTHETIC tenant's rows under FORCE RLS, never BYPASSRLS (PG FORCE-RLS tests: only the synthetic tenant's rows visible; a different tenant + a no-context session see ZERO rows; the per-tenant audit chain verify_chain(...).ok is True)."
  no_real_data: "NO real client/vendor data — SYNTH_* / neutral names only; a structurally-invalid synthetic ISIN; no real ISIN/CUSIP/SEDOL/LEI/exchange/agency names."
