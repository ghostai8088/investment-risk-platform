  ev_reference_data: "corporate_action = EV effective-dated reference data (OD-P1B-B); one physical row; amend = in-place EV supersede (REFERENCE.UPDATE); NOT IA, NOT FR; the EV valid_from/valid_to record axis is distinct from the inert business-date columns (announcement/ex/record/pay/effective_date)"
