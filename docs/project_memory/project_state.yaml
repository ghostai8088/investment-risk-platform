  cross_tenant: "cross-tenant issuer_id/instrument_id/entity_id fail closed via the EXPLICIT tenant predicate (resolve_* -> *NotVisible) pre-commit; RLS WITH CHECK only gates the row's own tenant_id"
  reqs: "REQ-SMR-001 In-Progress (terms math -> P2+); REQ-SMR-003 In-Progress partial (precedence/external-validation -> P1C/OD-012)"

