  status_lifecycle: "single status field ANNOUNCED -> CONFIRMED -> CANCELLED (CANCELLED terminal; no is_active dual flag — the P1B-3 arch-1 lesson); a thin transition guard rejects illegal/no-op/out-of-vocab moves (IllegalStatusTransition -> 409; bad initial status -> 422) with NO DB write — validation, not a workflow engine"
