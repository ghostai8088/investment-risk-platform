      # Stage 4 (ES-HS-1) runs AFTER stage 3 and BEFORE the downgrade smoke — the ONLY
      # pin-safe slot (the campaign pins 16 codes set-equal, the multifamily suite pins 17;
      # this stage registers the 18th). The ordering discipline ALSO has a FILENAME leg:
      # local full-PG runs collect alphabetically, so the stage-4 suites are named
      # test_demo_stage4_eshs* ('s' > 'h'/'m') — an earlier-sorting name breaks the
      # multifamily 17-pin in a single-invocation local battery. The downgrade smoke below
      # then exercises 0041's destructive ES_HISTORICAL delete against THIS stage's rows on
      # every CI run.
      - name: Demo stage-4 empirical-ES test (Postgres, ES-HS-1 / OD-ES-HS-1-F)
        env:
          DATABASE_URL: postgresql+psycopg://irp:irp@localhost:5432/irp
          IRP_TEST_DATABASE_URL: postgresql+psycopg://irp:irp@localhost:5432/irp
        run: pytest packages/shared-python/tests/test_demo_stage4_eshs_pg.py -q
      # Stage 5 (RS-1) runs AFTER stage 4 and BEFORE the downgrade smoke. It mints NO new
      # model code (two estimator VERSIONS of risk.proxy_weight.regression), so the 16/17/18
      # code-count pins above all hold; the filename leg ('stage5' > 'stage4' alpha-sort)
      # keeps a single-invocation local battery ordered the same way.
      - name: Demo stage-5 residual-estimator test (Postgres, RS-1 / OD-RS-1-E)
        env:
          DATABASE_URL: postgresql+psycopg://irp:irp@localhost:5432/irp
          IRP_TEST_DATABASE_URL: postgresql+psycopg://irp:irp@localhost:5432/irp
        run: pytest packages/shared-python/tests/test_demo_stage5_rs1_pg.py -q
      # Stage 6 (DS-2) runs AFTER stage 5 and BEFORE the downgrade smoke. It mints NO new model
      # code (two desmoothing estimator VERSIONS), so every count pin above holds; the downgrade
      # smoke below then exercises 0042's destructive NULL-alpha delete against THIS stage's
      # Okunev-White rows on every run (the 0041 coupling precedent).
      - name: Demo stage-6 desmoothing-estimator test (Postgres, DS-2 / OD-DS-2-E)
        env:
          DATABASE_URL: postgresql+psycopg://irp:irp@localhost:5432/irp
          IRP_TEST_DATABASE_URL: postgresql+psycopg://irp:irp@localhost:5432/irp
        run: pytest packages/shared-python/tests/test_demo_stage6_ds2_pg.py -q
      # Stage 7 (BT-3) runs AFTER stage 6 and BEFORE the downgrade smoke. It mints ONE new
      # model code (risk.es_backtest — the 19-code end state its own suite pins; every
      # earlier count pin holds at its sequence point); the smoke below then exercises 0043's
      # es_value column drop against THIS stage's ES-backtest rows on every run.
      - name: Demo stage-7 ES-backtest test (Postgres, BT-3 / OD-BT-3-F)
        env:
          DATABASE_URL: postgresql+psycopg://irp:irp@localhost:5432/irp
          IRP_TEST_DATABASE_URL: postgresql+psycopg://irp:irp@localhost:5432/irp
        run: pytest packages/shared-python/tests/test_demo_stage7_bt3_pg.py -q
      - name: Revert migrations (downgrade smoke)
        env:
          DATABASE_URL: postgresql+psycopg://irp:irp@localhost:5432/irp
        run: alembic downgrade base

