# FE-3b (review HIGH-1 + MED-1): the SPA image needs two things stock nginx does NOT do —
#   (1) HTML5 history fallback, so deep-link routes (e.g. /callback, the OIDC redirect target)
#       serve index.html instead of 404ing (stock nginx maps /callback to a missing file); and
#   (2) a proxy for the governed read prefixes to the backend, since the SPA fetches path-relative
#       (the Vite dev server proxies these in dev; the deployed nginx must do the same).
# The Authorization: Bearer header passes through to the backend (nginx forwards request headers).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # (2) The governed read prefixes (mirrors apps/frontend/vite.config.ts) → the backend service.
    location ~ ^/(risk|perf|exposure|portfolios|positions|valuations|holdings|models|snapshots|audit|lineage|pacing|commitments)(/|$) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # (1) Everything else is a client-side route → serve the SPA shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
