# Local development composition — scaffold. No production secrets.
# Copy .env.example to .env and set local-only values before running (BR-10).
# Note: the database service is provided for future local development only; in Step 1D
# the application defines no schema and does not connect to it.

services:
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    env_file: .env
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file: .env

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    ports:
      - "5173:80"

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - irp_pgdata:/var/lib/postgresql/data

volumes:
  irp_pgdata:
