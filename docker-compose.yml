# Local development composition — scaffold. No production secrets.
# Copy .env.example to .env and set local-only values before running (BR-10).
# Note: the database service is provided for future local development only; in Step 1D
# the application defines no schema and does not connect to it.

services:
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    env_file: .env
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file: .env

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
      # FE-3b (OQ-FE-3b-4=A): VITE_* config is inlined at build time. Defaults keep the dev_header
      # demo; for the oidc login set these in .env (see infra/keycloak/README.md) and rebuild.
      args:
        VITE_AUTH_MODE: ${VITE_AUTH_MODE:-dev_header}
        VITE_OIDC_ISSUER: ${VITE_OIDC_ISSUER:-}
        VITE_OIDC_CLIENT_ID: ${VITE_OIDC_CLIENT_ID:-}
        VITE_OIDC_REDIRECT_URI: ${VITE_OIDC_REDIRECT_URI:-}
    ports:
      - "5173:80"

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - irp_pgdata:/var/lib/postgresql/data

  # Local-dev OIDC provider (SSO-1 / AD-007, closes OD-048). Opt-in only:
  #   docker compose --profile oidc up keycloak
  # Imports infra/keycloak/irp-local-realm.json (realm "irp-local"). NOT started by a plain
  # `docker compose up`, and NOT a CI dependency (CI verifies tokens with locally-signed keys).
  # Admin credentials are local-only dev placeholders (BR-10) — override via .env if desired.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    profiles: ["oidc"]
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro

volumes:
  irp_pgdata:
